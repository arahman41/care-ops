apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: care-ops
spec:
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - {name: POSTGRES_DB, value: care_ops}
            - {name: POSTGRES_USER, value: care_ops}
            - {name: POSTGRES_PASSWORD, value: change_me}
          ports: [{containerPort: 5432}]
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: care-ops
spec:
  selector: {app: postgres}
  ports: [{port: 5432, targetPort: 5432}]
