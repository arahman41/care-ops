apiVersion: apps/v1
kind: Deployment
metadata:
  name: intake
  namespace: care-ops
spec:
  replicas: 1
  selector: {matchLabels: {app: intake}}
  template:
    metadata: {labels: {app: intake}}
    spec:
      containers:
        - name: intake
          image: care-ops-intake:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8000}]
          envFrom:
            - secretRef: {name: care-ops-secrets}
          env:
            - {name: POSTGRES_HOST, value: db}
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: intake
  namespace: care-ops
spec:
  selector: {app: intake}
  ports: [{port: 8000, targetPort: 8000}]
