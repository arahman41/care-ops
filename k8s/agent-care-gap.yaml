apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-care-gap
  namespace: care-ops
spec:
  replicas: 1
  selector: {matchLabels: {app: agent-care-gap}}
  template:
    metadata: {labels: {app: agent-care-gap}}
    spec:
      containers:
        - name: agent-care-gap
          image: care-ops-agent_care_gap:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8000}]
          envFrom:
            - secretRef: {name: care-ops-secrets}
          env:
            - {name: POSTGRES_HOST, value: db}
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: agent-care-gap
  namespace: care-ops
spec:
  selector: {app: agent-care-gap}
  ports: [{port: 8000, targetPort: 8000}]
