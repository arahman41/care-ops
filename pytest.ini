[pytest]
# Restrict collection to tests/. Without this, pytest's default *_test.py
# glob also matches scripts/load_test.py (a Locust load-test script, not a
# test file), silently imports it during collection, and that import runs
# gevent.monkey.patch_all() at module load time. That monkey-patches
# threading process-wide and deadlocks the moment anything later spins up a
# real background thread that touches an unpatched import (reproduced: a
# FastAPI TestClient's anyio portal thread hitting scipy's first import).
# The file has since been renamed to scripts/locustfile.py, which does not
# match the glob either, but this stays as the guard against the whole
# class of bug, not just this one instance of it.
testpaths = tests
