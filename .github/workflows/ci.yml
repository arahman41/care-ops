name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: care_ops
          POSTGRES_USER: care_ops
          POSTGRES_PASSWORD: change_me
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U care_ops"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      POSTGRES_HOST: localhost
      ANTHROPIC_API_KEY: dummy-key-for-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install
        run: |
          pip install -r requirements-dev.txt
          pip install -r governance/requirements.txt
      - name: Load schema
        run: psql "postgresql://care_ops:change_me@localhost:5432/care_ops" -f db/schema.sql
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=shared --cov=services --cov=governance --cov-report=term-missing
